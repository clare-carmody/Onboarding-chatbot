<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Melba — Find Your Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF0EC;
    --primary: #5151F7;
    --primary-light: #EEEEFF;
    --text-dark: #1A1040;
    --text-mid: #6B6B8A;
    --text-light: #A0A0BC;
    --border: #EAE0F2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #D6C8BF;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    font-family: 'DM Sans', sans-serif;
    padding: 20px 0 40px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.28);
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .chat-header {
    padding: 52px 24px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5151F7, #D97AC4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.2;
  }
  .header-status {
    font-size: 12px;
    color: var(--text-mid);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }
  .status-dot { width: 7px; height: 7px; background: #4CAF50; border-radius: 50%; }
  .progress-wrap { display: flex; align-items: center; gap: 5px; }
  .prog-step {
    width: 24px; height: 3px;
    background: var(--border);
    border-radius: 100px;
    transition: background 0.4s;
  }
  .prog-step.done { background: var(--primary); }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  .chat-spacer { flex: 1; min-height: 0; }

  /* BUBBLE ROW */
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    margin-bottom: 2px;
  }
  .bubble-row.show { opacity: 1; transform: translateY(0); }
  .bubble-row.user-row { justify-content: flex-end; }
  .bubble-row.melba-row { justify-content: flex-start; }

  .mini-av {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5151F7, #D97AC4);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .mini-av.ghost { visibility: hidden; }

  .bubble {
    max-width: 74%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
  }
  .melba-bubble {
    background: #fff;
    color: var(--text-dark);
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
  }
  .user-bubble {
    background: var(--primary);
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  /* TYPING */
  .typing-row {
    display: flex; align-items: flex-end; gap: 8px;
    margin-bottom: 2px;
    opacity: 0; transition: opacity 0.2s;
  }
  .typing-row.show { opacity: 1; }
  .typing-bubble {
    background: #fff;
    border-radius: 18px; border-bottom-left-radius: 5px;
    padding: 13px 16px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    display: flex; gap: 5px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--text-light);
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* CHIPS */
  .chips-wrap {
    flex-shrink: 0;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    opacity: 0;
  }
  .chips-wrap.open {
    max-height: 160px;
    opacity: 1;
  }
  .chips-inner {
    padding: 10px 16px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 9px 15px;
    background: #fff;
    border: 1.5px solid #DDD6F0;
    border-radius: 100px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .chip:active { transform: scale(0.96); }
  .chip.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* INPUT */
  .input-area {
    flex-shrink: 0;
    padding: 10px 16px 38px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .text-input {
    flex: 1;
    padding: 12px 16px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--primary); }
  .text-input::placeholder { color: var(--text-light); }
  .send-btn {
    width: 42px; height: 42px;
    background: var(--primary);
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
    opacity: 0.35; pointer-events: none;
  }
  .send-btn.active { opacity: 1; pointer-events: all; }
  .send-btn:active { transform: scale(0.92); }

  /* EPISODE CARD */
  .ep-card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    width: 240px;
  }
  .ep-cover {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
  }
  .ep-cover-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: linear-gradient(135deg, #7B6CF6 0%, #D97AC4 100%);
  }
  .ep-body { padding: 14px 16px 16px; }
  .ep-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .ep-meta {
    font-size: 12px;
    color: var(--text-mid);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .ep-spice { color: #E8521A; margin-right: 4px; letter-spacing: -1px; }
  .ep-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .ep-btn {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .ep-btn:active { transform: scale(0.98); opacity: 0.9; }
  .ep-btn-icon {
    width: 18px; height: 18px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="phone">

  <div class="chat-header">
    <div class="avatar">🌸</div>
    <div class="header-info">
      <div class="header-name">Melba</div>
      <div class="header-status"><div class="status-dot"></div>Your intimacy guide</div>
    </div>
    <div class="progress-wrap">
      <div class="prog-step" id="p1"></div>
      <div class="prog-step" id="p2"></div>
      <div class="prog-step" id="p3"></div>
      <div class="prog-step" id="p4"></div>
      <div class="prog-step" id="p5"></div>
    </div>
  </div>

  <div class="chat-area" id="chat">
    <div class="chat-spacer"></div>
  </div>

  <div class="chips-wrap" id="chipsWrap">
    <div class="chips-inner" id="chips"></div>
  </div>

  <div class="input-area">
    <input class="text-input" id="textInput" placeholder="Type a message…" oninput="onType()" onkeydown="onKey(event)" />
    <button class="send-btn" id="sendBtn" onclick="sendFree()">
      <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><path d="M16 9L2 2l2.5 7L2 16l14-7z" fill="white"/></svg>
    </button>
  </div>

</div>

<script>
const chatEl = document.getElementById('chat');
const chipsWrap = document.getElementById('chipsWrap');
const chipsInner = document.getElementById('chips');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');

let currentStep = 0;
let typing = null;
let locked = false;

// Track answers across steps: goal, mood, experience, leads, spice
const userAnswers = { goal: '', mood: '', experience: '', leads: '', spice: '' };
const answerKeys = ['goal', 'mood', 'experience', 'leads', 'spice'];

const steps = [
  {
    progress: 1,
    messages: [
      { text: "Hey, I'm your Melba guide 🌸", gap: 400 },
      { text: "This conversation is just for you — your partner won't see your exact words, only what we choose to share together.", gap: 1100 },
      { text: "What brings you here today?", gap: 900 }
    ],
    chips: ["✨ New experiences", "🔥 Spice things up", "💜 Reconnect", "🌶️ Explore fantasies"]
  },
  {
    progress: 2,
    ack: ["Love that 💜", "Great, thank you 🙏", "Lovely 💜", "Got it ✨"],
    messages: [
      { text: "How are you both feeling right now, honestly? Your energy tonight shapes everything.", gap: 900 }
    ],
    chips: ["🤍 Tender, want to reconnect", "😄 Playful, light mood", "🔥 Turned on, ready", "✨ Curious, open to something new"]
  },
  {
    progress: 3,
    ack: ["Got it 🙌", "Perfect ✨", "Noted 💫"],
    messages: [
      { text: "What kind of experience feels right tonight?", gap: 800 }
    ],
    chips: ["🕯️ Slow touch & massage", "💋 Oral pleasure", "🎭 Power, roleplay, sensation", "🔄 New positions together"]
  },
  {
    progress: 4,
    ack: ["Nice 🔥", "Love it ✨", "Ooh 😊"],
    messages: [
      { text: "Tonight — would you love to be guided, take the lead, or discover together?", gap: 800 }
    ],
    chips: ["🌸 Be guided", "⚡ Take the lead", "🫶 Discover together"]
  },
  {
    progress: 5,
    ack: ["Perfect.", "Lovely 🌸"],
    messages: [
      { text: "Last one, I promise 😊", gap: 600 },
      { text: "How adventurous are you feeling? You can always go further later.", gap: 700 }
    ],
    chips: ["🌶️ Soft & intimate", "🌶️🌶️ A little spicy", "🌶️🌶️🌶️ Turn it up"]
  },
  {
    progress: 5,
    ack: [],
    messages: [
      { text: "I've got you 💫", gap: 400 },
      { text: "Based on what you've shared, here's your first Melba experience:", gap: 1000 }
    ],
    result: true
  }
];

// ── Episode library (subset for matching — key fields only) ──────────────────
const EPISODES = [
  {id:"ep_001",name:"Beneath her Sheets",mood:"CONNECTION",topics:["EROTIC_MASSAGE","MINDFUL_AND_CONNECTED"],who_is_guided:"HER",spice:"🌶️",practice_tags:["Massage","Mindful Touch"],latest:true},
  {id:"ep_002",name:"The Morning Kiss",mood:"CONNECTION",topics:["MINDFUL_AND_CONNECTED","KISSING"],who_is_guided:"BOTH",spice:"🌶️",practice_tags:["Kissing","Connection"],latest:true},
  {id:"ep_003",name:"Tantric Touch",mood:"SENSUAL",topics:["EROTIC_MASSAGE","MINDFUL_AND_CONNECTED"],who_is_guided:"BOTH",spice:"🌶️🌶️",practice_tags:["Tantric","Massage"],latest:true},
  {id:"ep_004",name:"Her Pleasure First",mood:"SENSUAL",topics:["ORAL_PLEASURE","MINDFUL_AND_CONNECTED"],who_is_guided:"HER",spice:"🌶️🌶️",practice_tags:["Oral","Her Pleasure"],latest:true},
  {id:"ep_005",name:"Take Command",mood:"INTENSE",topics:["POWER_AND_CONTROL","ROLE_PLAYING"],who_is_guided:"HIM",spice:"🌶️🌶️🌶️",practice_tags:["Power","Roleplay"],latest:true},
  {id:"ep_006",name:"Blindfolded",mood:"INTENSE",topics:["SENSORY_PLAY","POWER_AND_CONTROL"],who_is_guided:"BOTH",spice:"🌶️🌶️🌶️",practice_tags:["Sensory","Blindfold"],latest:true},
  {id:"ep_007",name:"Playful Tease",mood:"PLAYFUL",topics:["MINDFUL_AND_CONNECTED","ROLE_PLAYING"],who_is_guided:"BOTH",spice:"🌶️🌶️",practice_tags:["Teasing","Playful"],latest:true},
  {id:"ep_008",name:"New Angles",mood:"SENSUAL",topics:["NEW_SEX_POSITIONS","MINDFUL_AND_CONNECTED"],who_is_guided:"BOTH",spice:"🌶️🌶️",practice_tags:["Positions","Exploration"],latest:true},
  {id:"ep_009",name:"Slow Burn",mood:"SENSUAL",topics:["EROTIC_MASSAGE","ORAL_PLEASURE"],who_is_guided:"HER",spice:"🌶️🌶️",practice_tags:["Slow","Sensual"],latest:true},
  {id:"ep_010",name:"Reconnect",mood:"CONNECTION",topics:["MINDFUL_AND_CONNECTED","KISSING"],who_is_guided:"BOTH",spice:"🌶️",practice_tags:["Connection","Intimacy"],latest:true},
  {id:"ep_011",name:"The Dominant",mood:"INTENSE",topics:["POWER_AND_CONTROL","SENSORY_PLAY"],who_is_guided:"HIM",spice:"🌶️🌶️🌶️",practice_tags:["Dominance","Intensity"],latest:true},
  {id:"ep_012",name:"Playful Roleplay",mood:"PLAYFUL",topics:["ROLE_PLAYING","NEW_SEX_POSITIONS"],who_is_guided:"BOTH",spice:"🌶️🌶️",practice_tags:["Roleplay","Fun"],latest:true}
];

// ── Fetch match from Netlify function ────────────────────────────────────────
async function fetchMatch() {
  try {
    const resp = await fetch('/.netlify/functions/match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: userAnswers, episodes: EPISODES })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch (err) {
    console.error('fetchMatch error:', err);
    return null;
  }
}

// ── Utility ──────────────────────────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollDown() {
  setTimeout(() => { chatEl.scrollTop = chatEl.scrollHeight; }, 40);
}

function showTyping() {
  removeTyping();
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.innerHTML = `<div class="mini-av">🌸</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatEl.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('show')));
  typing = row;
  scrollDown();
}

function removeTyping() {
  if (typing) { typing.remove(); typing = null; }
}

function addMelba(text, showAv = true) {
  const row = document.createElement('div');
  row.className = 'bubble-row melba-row';
  const av = document.createElement('div');
  av.className = `mini-av ${showAv ? '' : 'ghost'}`;
  av.textContent = '🌸';
  const bub = document.createElement('div');
  bub.className = 'bubble melba-bubble';
  bub.textContent = text;
  row.appendChild(av); row.appendChild(bub);
  chatEl.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('show')));
  scrollDown();
}

function addUser(text) {
  const row = document.createElement('div');
  row.className = 'bubble-row user-row';
  const bub = document.createElement('div');
  bub.className = 'bubble user-bubble';
  bub.textContent = text;
  row.appendChild(bub);
  chatEl.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('show')));
  scrollDown();
}

function addResultCard(match) {
  const row = document.createElement('div');
  row.className = 'bubble-row melba-row';
  const av = document.createElement('div');
  av.className = 'mini-av'; av.textContent = '🌸';

  const name = match ? match.episode_name : 'Beneath her Sheets';
  const reason = match ? match.reason : "You're both craving something tender tonight. Turn the simple touch of fabric into a guided massage that awakens sensation, comfort, and connection.";
  const spice = match ? (match.spice || '🌶️') : '🌶️';
  const tags = match ? (match.practice_tags || []).join(' · ') : 'Massage · Mindful Touch';
  const coverHtml = (match && match.image)
    ? `<img class="ep-cover" src="https://melba-app.com/images/${match.image}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" /><div class="ep-cover-placeholder" style="display:none"></div>`
    : `<div class="ep-cover-placeholder"></div>`;

  const card = document.createElement('div');
  card.className = 'ep-card';
  card.innerHTML = `
    ${coverHtml}
    <div class="ep-body">
      <div class="ep-title">${name}</div>
      <div class="ep-meta"><span class="ep-spice">${spice}</span>${tags}</div>
      <div class="ep-desc">${reason}</div>
      <button class="ep-btn">
        <div class="ep-btn-icon">
          <svg width="8" height="10" viewBox="0 0 8 10" fill="none"><path d="M1 1l6 4-6 4V1z" fill="white"/></svg>
        </div>
        Start guided experience
      </button>
    </div>`;

  row.appendChild(av); row.appendChild(card);
  chatEl.appendChild(row);
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('show')));
  scrollDown();
}

function showChips(list) {
  chipsInner.innerHTML = '';
  list.forEach(label => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.textContent = label;
    c.onclick = () => {
      chipsInner.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
      textInput.value = label;
      sendBtn.classList.add('active');
    };
    chipsInner.appendChild(c);
  });
  chipsWrap.classList.add('open');
}

function hideChips() {
  chipsWrap.classList.remove('open');
}

function updateProgress(n) {
  for (let i = 1; i <= 5; i++) {
    document.getElementById('p' + i).classList.toggle('done', i <= n);
  }
}

async function runStep(index) {
  locked = true;
  if (index >= steps.length) return;
  const step = steps[index];
  updateProgress(step.progress);
  hideChips();

  const msgs = step.messages;
  for (let i = 0; i < msgs.length; i++) {
    await delay(msgs[i].gap || 600);
    showTyping();
    await delay(750);
    removeTyping();
    addMelba(msgs[i].text, i === msgs.length - 1);
    await delay(80);
  }

  if (step.result) {
    // Kick off API call while showing typing indicator
    showTyping();
    const match = await fetchMatch();
    removeTyping();
    await delay(300);
    addResultCard(match);
    await delay(1400);
    showTyping();
    await delay(800);
    removeTyping();
    addMelba("Now send this link to your partner so they can answer too — then your joint recommendation unlocks 🔓", true);
    locked = false;
    return;
  }

  await delay(350);
  if (step.chips) showChips(step.chips);
  locked = false;
}

async function handleAnswer(text) {
  if (locked) return;
  locked = true;
  hideChips();
  textInput.value = '';
  sendBtn.classList.remove('active');
  addUser(text);

  // Store answer by step index (steps 0–4 = goal/mood/experience/leads/spice)
  if (currentStep < answerKeys.length) {
    userAnswers[answerKeys[currentStep]] = text;
  }

  await delay(300);

  const nextStep = steps[currentStep + 1];
  if (nextStep && nextStep.ack && nextStep.ack.length) {
    const ack = nextStep.ack[Math.floor(Math.random() * nextStep.ack.length)];
    showTyping();
    await delay(600);
    removeTyping();
    addMelba(ack, false);
    await delay(200);
  }

  currentStep++;
  locked = false;
  runStep(currentStep);
}

function onType() {
  sendBtn.classList.toggle('active', textInput.value.trim().length > 0);
  if (textInput.value.trim()) {
    chipsInner.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  }
}

function onKey(e) {
  if (e.key === 'Enter' && textInput.value.trim()) sendFree();
}

function sendFree() {
  const val = textInput.value.trim();
  if (!val || locked) return;
  handleAnswer(val);
}

runStep(0);
</script>
</body>
</html>
